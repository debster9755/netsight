version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./examples:/app/examples
      - netsight_db:/app/data
    # Live capture requires host networking + privileged mode.
    # Remove if you only need file-based analysis.
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  netsight_db:
